        postgres-db:
            dbconnection: 'postgresql://userver:realty-parser@rc1b-g6eqg2ke29xcb8s1.mdb.yandexcloud.net:6432/userver'
            dbconnection#env: DB_CONNECTION
            blocking_task_processor: fs-task-processor
            dns_resolver: async
            sync-start: false
            connlimit_mode: manual

        dns-client:
            fs-task-processor: fs-task-processor