services:
  parser:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - logs:/var/log/realty-parser
    ports:
      - "9095:9095"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: realty_parser
      POSTGRES_PASSWORD: password
      POSTGRES_DB: realty_parser
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U realty_parser"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus_config.yaml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090" # Map Host 9095 to Container 9090
    restart: unless-stopped

volumes:
  pgdata:
  logs:
  promdata: # Added to persist your metrics