global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'realty-parser'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9095']

  - job_name: 'users-notifier'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9091']

  - job_name: 'flats-analyzer'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9093']

  - job_name: 'subscription-handler'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['host.docker.internal:9094']
